name: Update CRS Plugins

on:
  # Run daily at 07:00 UTC (one hour after CRS ruleset check)
  schedule:
    - cron: "0 7 * * *"
  # Allow manual trigger
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  update-plugins:
    name: Check for CRS plugin updates
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Make update script executable
        run: chmod +x .github/scripts/update-plugins.sh

      - name: Run plugin update script
        id: update
        run: |
          set +e
          .github/scripts/update-plugins.sh
          EXIT_CODE=$?
          set -e

          if [[ $EXIT_CODE -eq 0 ]]; then
            echo "updated=true" >> "$GITHUB_OUTPUT"
          elif [[ $EXIT_CODE -eq 2 ]]; then
            echo "updated=false" >> "$GITHUB_OUTPUT"
          else
            exit $EXIT_CODE
          fi

      - name: Create Pull Request
        if: steps.update.outputs.updated == 'true'
        uses: peter-evans/create-pull-request@v7
        with:
          # Use a repository-level Personal Access Token (PAT) to create the PR
          # so downstream `pull_request` workflows are triggered. Create a
          # secret named `CRS_BOT_TOKEN` in the repo settings containing a
          # PAT with `repo` scope. If you don't set this secret, the
          # workflow will continue to use the GITHUB_TOKEN but that may not
          # trigger other workflows.
          token: ${{ secrets.CRS_BOT_TOKEN }}
          commit-message: "chore: update CRS plugins"
          title: "chore: update CRS plugins"
          body: |
            Automated update of OWASP CRS plugins.

            ${{ steps.update.outputs.summary }}

            Plugin registry: https://github.com/coreruleset/plugin-registry

            This PR was created automatically by the `update-crs-plugins` workflow.
          branch: chore/update-crs-plugins
          delete-branch: true
          labels: dependencies
          assignees: aaronspruit
