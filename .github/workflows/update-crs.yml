name: Update CRS Ruleset

on:
  # Run daily at 06:00 UTC
  schedule:
    - cron: "0 6 * * *"
  # Allow manual trigger
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  update-crs:
    name: Check for CRS updates
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Make update script executable
        run: chmod +x .github/scripts/update-crs.sh

      - name: Run CRS update script
        id: update
        run: |
          set +e
          .github/scripts/update-crs.sh
          EXIT_CODE=$?
          set -e

          if [[ $EXIT_CODE -eq 0 ]]; then
            NEW_VERSION="$(grep '^CRS_VERSION=' .crs-versions | head -1 | cut -d= -f2)"
            echo "updated=true" >> "$GITHUB_OUTPUT"
            echo "version=${NEW_VERSION}" >> "$GITHUB_OUTPUT"
          elif [[ $EXIT_CODE -eq 2 ]]; then
            echo "updated=false" >> "$GITHUB_OUTPUT"
          else
            exit $EXIT_CODE
          fi

      - name: Create Pull Request
        if: steps.update.outputs.updated == 'true'
        uses: peter-evans/create-pull-request@v7
        with:
          # Use a repository-level Personal Access Token (PAT) to create the PR
          # so downstream `pull_request` workflows are triggered. Create a
          # secret named `CRS_BOT_TOKEN` in the repo settings containing a
          # PAT with `repo` scope. If you don't set this secret, the
          # workflow will continue to use the GITHUB_TOKEN but that may not
          # trigger other workflows.
          token: ${{ secrets.CRS_BOT_TOKEN }}
          commit-message: "chore: update CRS ruleset to v${{ steps.update.outputs.version }}"
          title: "chore: update CRS ruleset to v${{ steps.update.outputs.version }}"
          body: |
            Automated update of the OWASP Core Rule Set to **v${{ steps.update.outputs.version }}**.

            Release: https://github.com/coreruleset/coreruleset/releases/tag/v${{ steps.update.outputs.version }}

            This PR was created automatically by the `update-crs` workflow.
          branch: chore/update-crs-${{ steps.update.outputs.version }}
          delete-branch: true
          labels: dependencies
          assignees: aaronspruit